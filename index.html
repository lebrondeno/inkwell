<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA meta -->
    <meta name="theme-color" content="#863bff" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- SEO -->
    <meta name="description" content="Inkwell — A beautiful writing platform. Create, publish and share your stories." />
    <meta property="og:title" content="Inkwell — Write & Share" />

    <title>Inkwell — Write & Share</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .catch(() => {})
        })
      }
    </script>
  </body>
